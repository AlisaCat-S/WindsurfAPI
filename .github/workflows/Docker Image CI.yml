name: Docker Image CI

on:
  push:
    branches: [master, test]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (leave empty for auto short SHA)'
        required: false
        default: ''
      branch:
        description: 'Branch to build from (leave empty for current)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # Stage 1: Build per architecture
  # ==========================================
  build:
    name: Build ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Prepare variables
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          # Determine branch name
          BRANCH="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.branch }}" ]; then
            BRANCH="${{ github.event.inputs.branch }}"
          fi
          # Determine base tag
          if [ "${{ github.event_name }}" = "push" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            BASE_TAG="$SHORT_SHA"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            BASE_TAG="${{ github.event.inputs.tag }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            BASE_TAG="$SHORT_SHA"
          fi
          # Prefix with branch name if not master
          if [ "$BRANCH" != "master" ]; then
            echo "IMAGE_TAG=$BRANCH-$BASE_TAG" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=$BASE_TAG" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by architecture
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/windsurf-api:${{ env.IMAGE_TAG }}-${{ matrix.platform.arch }}
          cache-from: type=gha,scope=build-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform.arch }}

  # ==========================================
  # Stage 2: Merge multi-arch manifest
  # ==========================================
  merge:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Prepare variables
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          # Determine branch name
          BRANCH="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.branch }}" ]; then
            BRANCH="${{ github.event.inputs.branch }}"
          fi
          # Determine base tag
          if [ "${{ github.event_name }}" = "push" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            BASE_TAG="$SHORT_SHA"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            BASE_TAG="${{ github.event.inputs.tag }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            BASE_TAG="$SHORT_SHA"
          fi
          # Prefix with branch name if not master
          if [ "$BRANCH" != "master" ]; then
            echo "IMAGE_TAG=$BRANCH-$BASE_TAG" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=$BASE_TAG" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest and push
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.branch }}" ]; then
            BRANCH="${{ github.event.inputs.branch }}"
          fi
          TAGS="-t ghcr.io/${{ env.OWNER_LC }}/windsurf-api:${{ env.IMAGE_TAG }}"
          if [ "$BRANCH" = "master" ]; then
            TAGS="$TAGS -t ghcr.io/${{ env.OWNER_LC }}/windsurf-api:latest"
          fi
          docker buildx imagetools create \
            $TAGS \
            ghcr.io/${{ env.OWNER_LC }}/windsurf-api:${{ env.IMAGE_TAG }}-amd64 \
            ghcr.io/${{ env.OWNER_LC }}/windsurf-api:${{ env.IMAGE_TAG }}-arm64
